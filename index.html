<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FICHA CADASTRAL – CASE TECNOLOGIA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/imask@7.6.1/dist/imask.min.js"></script>

<style>
/* SEU CSS ORIGINAL – NÃO ALTERADO */
:root {
  --primary-color: #0b3c5d;
  --secondary-color: #1f7a8c;
  --bg-color: #f2f4f7;
  --white: #ffffff;
  --border-color: #cfd4da;
}
body { font-family: "Segoe UI", Arial, sans-serif; background: var(--bg-color); margin: 0; }
.container { max-width: 1000px; margin: 40px auto; background: var(--white); border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
header { padding: 24px; border-bottom: 2px solid var(--primary-color); text-align: center; }
section { padding: 30px; border-bottom: 1px solid #eee; }
h2 { color: var(--secondary-color); border-left: 4px solid var(--secondary-color); padding-left: 12px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
input, select { width: 100%; padding: 11px; border: 1px solid var(--border-color); border-radius: 5px; }
.actions { padding: 30px; background: #f1f3f5; text-align: right; }
button { background: var(--primary-color); color: #fff; padding: 14px 40px; border: none; border-radius: 6px; cursor: pointer; }
button.loading { opacity: .7; pointer-events: none; }
</style>
</head>

<body>
<div class="container">
<header>
<img src="https://www.casetecnologia.com.br/logo-h-w.png" alt="CASE Tecnologia">
<h1>Ficha Cadastral</h1>
</header>

<!-- ✅ CORREÇÃO AQUI -->
<form id="cadastroForm" method="POST" enctype="multipart/form-data">

<section>
<h2>Responsável Administrativo</h2>
<div class="grid">
<input name="adminNome" placeholder="Nome" required>
<input name="adminEmail" type="email" placeholder="E-mail" required>
<input name="adminCelular" placeholder="Celular" required>
</div>
</section>

<section>
<h2>Documento</h2>
<input type="file" name="arquivoAnexo" required>
</section>

<div class="actions">
<button type="submit" id="btnSubmit">Enviar Cadastro</button>
</div>

</form>
</div>

<script>
document.getElementById("cadastroForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.classList.add("loading");

  /* ✅ CORREÇÃO: formData EXISTE */
  const formData = new FormData(this);

  /* ✅ CORREÇÃO: sig SEM `\_` */
  const flowUrl =
    "https://defaultd2d4a6ef864d4fff8bac762a38f9fe.e5.environment.api.powerplatform.com" +
    "/powerautomate/automations/direct/workflows/da34ad5513864e2e967c2432d709228b" +
    "/triggers/manual/paths/invoke?api-version=1&sp=/triggers/manual/run&sv=1.0" +
    "&sig=dqDZSc1LHLuF_BChKAonST8RlKkbknk6-0EobCjtNJU";

  try {
    const r = await fetch(flowUrl, { method: "POST", body: formData });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    alert("Cadastro enviado com sucesso!");
    this.reset();
  } catch (err) {
    console.error(err);
    alert("Erro ao enviar cadastro.");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
});
</script>

</body>
</html>
