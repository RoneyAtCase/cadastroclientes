<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ficha Cadastral – CASE Tecnologia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  color:#333;
}

.container {
  max-width:1000px;
  margin:40px auto;
  background:#fff;
  border-radius:8px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

header {
  padding:24px;
  display:flex;
  align-items:center;
  gap:20px;
  border-bottom:1px solid #e0e0e0;
}

header img {
  height:42px;
}

header h1 {
  margin:0;
  font-size:22px;
  color:#0b3c5d;
}

section {
  padding:24px;
  border-bottom:1px solid #eee;
}

h2 {
  font-size:18px;
  color:#1f7a8c;
  margin-bottom:12px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
  gap:16px;
}

label {
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:4px;
}

input {
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:14px;
}

.checkbox-inline {
  display:flex;
  align-items:flex-start;
  gap:10px;
  margin:12px 0 20px 0;
  font-size:14px;
}

.checkbox-inline input {
  margin-top:3px;
}

.lgpd-box {
  background:#f9fafb;
  border:1px solid #ddd;
  border-radius:6px;
  padding:16px;
  margin-bottom:16px;
  font-size:14px;
  line-height:1.6;
}

.actions {
  padding:24px;
  text-align:right;
  background:#fafafa;
}

button {
  padding:12px 30px;
  font-size:15px;
  border:none;
  border-radius:4px;
  background:#0b3c5d;
  color:#fff;
  cursor:pointer;
}

button:hover {
  background:#1f7a8c;
}
</style>
</head>

<body>
<div class="container">

<header>
  <img src="https://www.casetecnologia.com.br/logo-h-w.png" alt="CASE Tecnologia">
  <h1>Ficha Cadastral</h1>
</header>

<form id="cadastroForm">

<!-- DADOS DA EMPRESA -->
<section>
<h2>Dados da Empresa</h2>
<div class="grid">
  <div><label>Razão Social / Nome</label><input name="razaoSocial" required></div>
  <div><label>CNPJ / CPF</label><input name="cnpjCpf" id="cnpjCpf" required></div>
  <div><label>Inscrição Estadual</label><input name="inscricaoEstadual"></div>
