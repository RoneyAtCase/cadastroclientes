<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FICHA CADASTRAL – CASE TECNOLOGIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/imask@7.6.1/dist/imask.min.js"></script>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f2f4f7;
      margin: 0;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      overflow: hidden;
    }
    header {
      padding: 24px;
      border-bottom: 2px solid #0b3c5d;
      text-align: center;
    }
    section {
      padding: 30px;
      border-bottom: 1px solid #eee;
    }
    h2 {
      color: #1f7a8c;
      border-left: 4px solid #1f7a8c;
      padding-left: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    label { font-weight: 600; }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .actions {
      padding: 30px;
      text-align: right;
      background: #f1f3f5;
    }
    button {
      background: #0b3c5d;
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button.loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>

<body>
<div class="container">

<header>
  <img src="https://www.casetecnologia.com.br/logo-h-w.png" height="60">
  <h1>Ficha Cadastral</h1>
</header>

<form id="cadastroForm" method="POST" enctype="multipart/form-data">

  <section>
    <h2>Responsável Administrativo</h2>
    <div class="grid">
      <div>
        <label>Nome *</label>
        <input name="adminNome" required>
      </div>
      <div>
        <label>Email *</label>
        <input type="email" name="adminEmail" required>
      </div>
      <div>
        <label>Celular *</label>
        <input name="adminCelular" required>
      </div>
    </div>
  </section>

  <section>
    <h2>Documento</h2>
    <label>Contrato Social *</label>
    <input type="file" name="arquivoAnexo" required>
  </section>

  <div class="actions">
    <button type="submit" id="btnSubmit">Enviar Cadastro</button>
  </div>

</form>
</div>

<script>
document.getElementById("cadastroForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const btn = document.getElementById("btnSubmit");
  btn.classList.add("loading");
  btn.disabled = true;

  const formData = new FormData(this);

  const flowUrl =
    "https://defaultd2d4a6ef864d4fff8bac762a38f9fe.e5.environment.api.powerplatform.com" +
    "/powerautomate/automations/direct/workflows/da34ad5513864e2e967c2432d709228b" +
    "/triggers/manual/paths/invoke?api-version=1&sp=/triggers/manual/run&sv=1.0" +
    "&sig=dqDZSc1LHLuF_BChKAonST8RlKkbknk6-0EobCjtNJU";

  try {
    const r = await fetch(flowUrl, {
      method: "POST",
      body: formData
    });

    if (!r.ok) throw new Error(`HTTP ${r.status}`);

    alert("Cadastro enviado com sucesso!");
    this.reset();

  } catch (err) {
    console.error(err);
    alert("Erro ao enviar o cadastro.");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
});
</script>

</body>
</html>
